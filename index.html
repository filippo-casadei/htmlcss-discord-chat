<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="stylesheet" href="./styles/style.css">
</head>


<body>
    <div class="app">


        <header>
            <P>HEADER<P>
        </header>

        <main> 
            <section class="sidebar">

                <div class="icons">
                    <img class="icona-discord" src="img/logo.webp" alt="logo discord">
                </div>

                <div class="icons">
                    <img class="icona" src="img/server arte.png" alt="immagine di un cervello colorato">
                </div>

                <div class="icons">
                    <img class="icona" src="img/server_boolean.png" alt="logo di boolean">
                </div>

                <div class="icons">
                    <img class="icona" src="img/server_italia.png" alt="immagine della bandiera italiana">
                </div>

                <div class="icons">
                    <img class="icona" src="img/server_nintendo.png" alt="logo nintendo switch">
                </div>

                <div class="icons">
                    <img class="icona" src="img/server_javascript.png" alt="logo di java script">
                </div>

                <div class="icons">
                    <img class="icona" src="img/server_pokemon.png" alt="immagine del retro di una carta pkmn">
                </div>
            
            </section>

            <section class="content">

                <h1 class="messaggi">
                    Messaggi
                </h1>

                <div class="barra-top">

                    <div class="searchicon">
                    <i class="bi bi-search"></i>
                    </div>

                    <div class="buttonfriend">
                        <i class="bi bi-person-fill-add"></i>
                        Aggiungi amici
                    </div>

                </div>
                
                <section class="listachat">

                    <div class="chats">
                        <img src="img/profile1.webp" alt="foto profilo Giuseppe Rossi">

                            <div class="chat-info">

                                <div class="chat-top">
                                 <span class="nome-chat">Giuseppe Rossi</span>
                                    <span class="orario-chat">2min</span>
                                </div>

                                <div class="chat-anteprima">
                                    Ciao! Tutto bene?
                                </div>

                            </div>

                    </div>

                </section>

            </section>
        </main>

        <footer>
            <P>FOOTER</P>
        </footer>


    </div>
    
</body>
</html>
